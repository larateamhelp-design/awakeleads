<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Free Strategy Call — Awake Leads</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a2e;background:#f8f5ff}
nav{background:#0d0d1a;padding:12px 48px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(124,58,237,.2)}
.back{color:rgba(255,255,255,.6);font-size:.9rem;text-decoration:none}
.back:hover{color:#fff}
.hero{background:linear-gradient(135deg,#0d0d1a,#2d1060);color:#fff;padding:48px 24px 36px;text-align:center}
.hero h1{font-size:1.9rem;font-weight:800;margin-bottom:10px}
.hero p{opacity:.8;max-width:500px;margin:0 auto;font-size:.95rem;line-height:1.6}
.perks{display:flex;justify-content:center;gap:28px;margin-top:20px;flex-wrap:wrap}
.perk{font-size:.82rem;opacity:.8}
.perk::before{content:"✓ ";color:#c084fc;font-weight:700}
.cal-wrap{max-width:780px;margin:0 auto;padding:20px 16px 60px}
iframe{width:100%;height:700px;border:none;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.12);background:#fff}
@media(max-width:640px){
  nav{padding:12px 20px}
  .hero{padding:36px 20px 28px}
  .hero h1{font-size:1.5rem}
  iframe{height:600px}
}
</style>
</head>
<body>

<nav>
  <a href="/"><img src="logo.png" alt="Awake Leads" style="height:170px;width:auto;display:block;"></a>
  <a href="/" class="back">← Back</a>
</nav>

<div class="hero">
  <h1>Book Your Free 15-Minute Strategy Call</h1>
  <p>Pick a time that works for you. We'll show you the AI in action — live — and tell you exactly how many booked calls you can expect from your lead list.</p>
  <div class="perks">
    <span class="perk">No sales pressure</span>
    <span class="perk">15 minutes</span>
    <span class="perk">See the AI live</span>
    <span class="perk">Free — no commitment</span>
  </div>
</div>

<div class="cal-wrap">
  <iframe src="https://api.leadconnectorhq.com/widget/booking/1VNp3RWFUlcDTkjZ2Zqi" 
    scrolling="yes" 
    id="msgsndr-calendar">
  </iframe>
</div>

<script>
// Auto-resize iframe based on content
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'calendar-height') {
    document.getElementById('msgsndr-calendar').style.height = e.data.height + 'px';
  }
});
</script>

</body>
</html>
